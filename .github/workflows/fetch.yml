name: Daily watchlist data fetch

on:
  schedule:
    - cron: "30 1 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch OHLCV data
        run: python3 fetch_watchlist_data.py

      - name: Commit updated data
        run: |
          git config user.name "watchlist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add watchlist_data.zip watchlist_data/manifest.json
          git commit -m "data $(date -u +%F)" || echo "no changes"
          git push
